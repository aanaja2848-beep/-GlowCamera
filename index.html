<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GlowCam - Foto Glowing Ganteng</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .camera-wrapper {
            position: relative;
            background: #000;
            aspect-ratio: 3/4;
            overflow: hidden;
        }

        #video, #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #canvas {
            display: none;
        }

        .controls {
            padding: 20px;
            background: white;
        }

        .effect-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        .effect-btn {
            padding: 10px;
            border: none;
            border-radius: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-size: 14px;
        }

        .effect-btn.active {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(102, 126, 234, 0.5);
            border: 2px solid white;
        }

        .effect-btn:hover {
            transform: translateY(-2px);
        }

        .slider-container {
            margin-bottom: 20px;
        }

        .slider-container label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
        }

        input[type="range"] {
            width: 100%;
            height: 5px;
            border-radius: 5px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #764ba2;
            cursor: pointer;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.2);
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .action-btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 16px;
        }

        .capture-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .reset-btn {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        .action-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 15px;
            text-align: center;
        }

        .result img {
            max-width: 100%;
            border-radius: 10px;
            margin-top: 10px;
        }

        .download-btn {
            margin-top: 10px;
            padding: 10px 20px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        @media (max-width: 600px) {
            .container {
                margin: 10px;
            }
            
            .effect-buttons {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="camera-wrapper">
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas"></canvas>
        </div>
        
        <div class="controls">
            <div class="effect-buttons">
                <button class="effect-btn" data-effect="none">Normal</button>
                <button class="effect-btn active" data-effect="glow">Glow Parah</button>
                <button class="effect-btn" data-effect="beauty">Ganteng</button>
                <button class="effect-btn" data-effect="golden">Golden Glow</button>
                <button class="effect-btn" data-effect="neon">Neon Glow</button>
            </div>
            
            <div class="slider-container">
                <label>Intensitas Glow: <span id="intensityValue">70</span>%</label>
                <input type="range" id="intensity" min="0" max="100" value="70">
            </div>
            
            <div class="action-buttons">
                <button class="action-btn capture-btn" id="captureBtn">📸 Ambil Foto</button>
                <button class="action-btn reset-btn" id="resetBtn">🔄 Reset</button>
            </div>
            
            <div class="result" id="result" style="display: none;">
                <h4>Hasil Foto Glowing!</h4>
                <img id="resultImage" alt="Hasil foto">
                <button class="download-btn" id="downloadBtn">💾 Download Foto</button>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let currentEffect = 'glow';
        let intensity = 70;
        let stream = null;
        let animationId = null;

        // Inisialisasi kamera
        async function initCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: 'user',
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    } 
                });
                video.srcObject = stream;
                await video.play();
                
                // Set ukuran canvas sesuai video
                canvas.width = video.videoWidth || 1280;
                canvas.height = video.videoHeight || 720;
                
                startProcessing();
            } catch (err) {
                console.error('Error accessing camera:', err);
                alert('Tidak dapat mengakses kamera. Pastikan Anda memberikan izin kamera.');
            }
        }

        // Mulai proses frame
        function startProcessing() {
            if (animationId) {
                cancelAnimationFrame(animationId);
            }
            
            function processFrame() {
                if (video.videoWidth && video.videoHeight) {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    
                    // Gambar frame video ke canvas
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    
                    // Terapkan efek
                    applyEffect();
                    
                    // Tampilkan canvas
                    canvas.style.display = 'block';
                    video.style.display = 'none';
                }
                animationId = requestAnimationFrame(processFrame);
            }
            
            processFrame();
        }

        // Terapkan efek pada canvas
        function applyEffect() {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            
            switch(currentEffect) {
                case 'glow':
                    applyGlowEffect(data, intensity);
                    break;
                case 'beauty':
                    applyBeautyEffect(data, intensity);
                    break;
                case 'golden':
                    applyGoldenGlow(data, intensity);
                    break;
                case 'neon':
                    applyNeonGlow(data, intensity);
                    break;
                default:
                    // Normal - tanpa efek
                    break;
            }
            
            ctx.putImageData(imageData, 0, 0);
        }

        // Efek Glow Parah
        function applyGlowEffect(data, intensity) {
            const factor = intensity / 50;
            for (let i = 0; i < data.length; i += 4) {
                let r = data[i];
                let g = data[i+1];
                let b = data[i+2];
                
                // Hitung brightness
                let brightness = (r + g + b) / 3;
                
                // Tambah glow dengan warna keemasan
                data[i] = Math.min(255, r + brightness * factor * 0.8);
                data[i+1] = Math.min(255, g + brightness * factor * 0.6);
                data[i+2] = Math.min(255, b + brightness * factor * 0.3);
                
                // Saturasi warna untuk efek glowing
                data[i] = Math.min(255, data[i] + factor * 15);
                data[i+1] = Math.min(255, data[i+1] + factor * 10);
            }
        }

        // Efek Ganteng (Beauty Filter)
        function applyBeautyEffect(data, intensity) {
            const factor = intensity / 100;
            for (let i = 0; i < data.length; i += 4) {
                let r = data[i];
                let g = data[i+1];
                let b = data[i+2];
                
                // Smoothing dan brightening
                data[i] = Math.min(255, r * (1 + factor * 0.3) + 30 * factor);
                data[i+1] = Math.min(255, g * (1 + factor * 0.2) + 25 * factor);
                data[i+2] = Math.min(255, b * (1 + factor * 0.1) + 20 * factor);
                
                // Tambah sedikit pinkish untuk skin tone
                if (r > g && r > b) {
                    data[i+1] = Math.min(255, data[i+1] + 15 * factor);
                }
            }
        }

        // Efek Golden Glow
        function applyGoldenGlow(data, intensity) {
            const factor = intensity / 50;
            for (let i = 0; i < data.length; i += 4) {
                let r = data[i];
                let g = data[i+1];
                let b = data[i+2];
                
                // Golden tone
                data[i] = Math.min(255, r + 40 * factor);
                data[i+1] = Math.min(255, g + 30 * factor);
                data[i+2] = Math.min(255, b * (1 - factor * 0.3));
                
                // Add glow
                let avg = (data[i] + data[i+1] + data[i+2]) / 3;
                data[i] = Math.min(255, data[i] + avg * factor * 0.5);
                data[i+1] = Math.min(255, data[i+1] + avg * factor * 0.5);
            }
        }

        // Efek Neon Glow
        function applyNeonGlow(data, intensity) {
            const factor = intensity / 50;
            for (let i = 0; i < data.length; i += 4) {
                let r = data[i];
                let g = data[i+1];
                let b = data[i+2];
                
                let max = Math.max(r, g, b);
                
                // Neon effect dengan warna cyan/magenta
                data[i] = Math.min(255, r + max * factor * 0.8);
                data[i+1] = Math.min(255, g + max * factor * 0.9);
                data[i+2] = Math.min(255, b + max * factor * 1.2);
                
                // Kontras tinggi untuk efek neon
                if (max > 100) {
                    data[i] = Math.min(255, data[i] + 50 * factor);
                    data[i+1] = Math.min(255, data[i+1] + 40 * factor);
                    data[i+2] = Math.min(255, data[i+2] + 60 * factor);
                }
            }
        }

        // Ambil foto
        function capturePhoto() {
            const resultCanvas = document.createElement('canvas');
            resultCanvas.width = canvas.width;
            resultCanvas.height = canvas.height;
            const resultCtx = resultCanvas.getContext('2d');
            
            // Gambar frame saat ini dengan efek
            resultCtx.drawImage(canvas, 0, 0);
            
            // Tampilkan hasil
            const resultImage = document.getElementById('resultImage');
            resultImage.src = resultCanvas.toDataURL('image/jpeg', 0.9);
            document.getElementById('result').style.display = 'block';
            
            // Scroll ke hasil
            document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
        }

        // Reset semua efek
        function resetEffects() {
            intensity = 70;
            document.getElementById('intensity').value = 70;
            document.getElementById('intensityValue').textContent = '70';
            
            // Reset effect button active state
            document.querySelectorAll('.effect-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.dataset.effect === 'glow') {
                    btn.classList.add('active');
                    currentEffect = 'glow';
                }
            });
        }

        // Download foto
        function downloadPhoto() {
            const resultImage = document.getElementById('resultImage');
            if (resultImage.src) {
                const link = document.createElement('a');
                link.download = `glowing-photo-${Date.now()}.jpg`;
                link.href = resultImage.src;
                link.click();
            }
        }

        // Event listeners
        document.querySelectorAll('.effect-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.effect-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentEffect = btn.dataset.effect;
            });
        });

        document.getElementById('intensity').addEventListener('input', (e) => {
            intensity = parseInt(e.target.value);
            document.getElementById('intensityValue').textContent = intensity;
        });

        document.getElementById('captureBtn').addEventListener('click', capturePhoto);
        document.getElementById('resetBtn').addEventListener('click', resetEffects);
        document.getElementById('downloadBtn').addEventListener('click', downloadPhoto);

        // Inisialisasi
        initCamera();

        // Cleanup saat halaman ditutup
        window.addEventListener('beforeunload', () => {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            if (animationId) {
                cancelAnimationFrame(animationId);
            }
        });
    </script>
</body>
</html>
